name: Recaler les tracés sur route (OSRM)

# Recale les tracés « grossiers » (segments droits entre arrêts) sur le réseau
# routier réel via OSRM, sur le JSON déjà commité, puis pousse la mise à jour.
# Les tracés détaillés issus du GTFS ne sont pas modifiés.

on:
  workflow_dispatch:
    inputs:
      osrm_url:
        description: "Base URL d'un serveur OSRM (profil driving)"
        required: true
        default: https://router.project-osrm.org

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Recaler les tracés grossiers
        run: node scripts/refine-osrm.mjs src/data/tan_gps_final.json "${{ github.event.inputs.osrm_url }}"

      - name: Commit si modifié
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data/tan_gps_final.json; then
            echo "Aucun changement."
          else
            git add src/data/tan_gps_final.json
            git commit -m "data: tracés grossiers recalés sur route (OSRM)"
            git push origin HEAD:main
            echo "Tracés recalés et poussés."
          fi
