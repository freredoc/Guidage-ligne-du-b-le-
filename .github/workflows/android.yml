name: Build APK Android (signé)

# Compile l'APK Capacitor signé en release.
#  - Sur un tag « v* » (ex: v1.0.0) : publie l'APK dans une Release GitHub.
#  - Manuellement (workflow_dispatch) : l'APK est disponible en artefact.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   ANDROID_KEYSTORE_BASE64    keystore (.keystore) encodé en base64
#   ANDROID_KEYSTORE_PASSWORD  mot de passe du keystore
#   ANDROID_KEY_ALIAS          alias de la clé (ex: tan)
#   ANDROID_KEY_PASSWORD       mot de passe de la clé

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version à publier (tag, ex: v1.0.0)"
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Déterminer la version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web (Vite)
        env:
          # Injecte la version dans l'app (pour le contrôle de mise à jour).
          VITE_APP_VERSION: ${{ steps.ver.outputs.tag }}
        run: npm run build

      - name: Sync Capacitor (web → android)
        run: npx cap sync android

      - name: Décoder le keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build APK release signé
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Renommer l'APK
        id: apk
        run: |
          SRC=android/app/build/outputs/apk/release/app-release.apk
          NAME="tan-gps-bus-${{ steps.ver.outputs.tag }}.apk"
          cp "$SRC" "$NAME"
          echo "path=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: tan-gps-bus-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publier la Release
        uses: softprops/action-gh-release@v2
        with:
          # action-gh-release crée le tag s'il n'existe pas encore.
          tag_name: ${{ steps.ver.outputs.tag }}
          files: ${{ steps.apk.outputs.path }}
          name: TAN GPS Bus ${{ steps.ver.outputs.tag }}
          body: |
            APK Android signé de **TAN GPS Bus** (${{ steps.ver.outputs.tag }}).

            Installation : téléchargez l'APK sur le téléphone, autorisez
            « installer des applications inconnues » pour votre navigateur/gestionnaire
            de fichiers, puis ouvrez le fichier.
